name: publish

on:
  release:
    types: [published]
  push:
    tags:
      - '*'

jobs:
  publish:
    # A tag push does the actual npm publish. Creating a GitHub Release (which
    # records the changelog notes) fires the `release` event too, but the tag
    # was already published — so skip it here to avoid a duplicate publish that
    # fails with "cannot publish over the previously published versions".
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm version --no-git-tag-version --allow-same-version ${{ github.ref_name }}
      - run: npm install
      - run: npm test
      - run: npm publish --provenance
